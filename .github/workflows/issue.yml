name: issues

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: ./echo.sh

